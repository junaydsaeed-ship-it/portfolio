<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brands — PhilmsbyJay</title>
  <meta name="description" content="PhilmsbyJay — Personal branding films for real people building real authority." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet" />

  <style>
    @font-face { font-family: 'NeueHaasDisplay'; src: url('NeueHaasDisplayLight.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'NeueHaasDisplay'; src: url('NeueHaasDisplayLightItalic.woff2') format('woff2'); font-weight: 300; font-style: italic; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #03070f; --bg-card: #080e1a;
      --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: rgba(240,240,240,0.45);
      --accent: #e8e0d0; --accent2: #c8b89a;
      --font-body: 'NeueHaasDisplay', 'Helvetica Neue', sans-serif;
      --nav-h: 68px; --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Site background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 55% 45% at 0% 0%, rgba(29,78,216,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 100% 100%, rgba(29,78,216,0.18) 0%, transparent 70%),
        linear-gradient(160deg, #03080f 0%, #020510 40%, #010208 100%);
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image:
        linear-gradient(rgba(59,130,246,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.055) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.15) 70%, transparent 100%);
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.15) 70%, transparent 100%);
      pointer-events: none;
    }

    ::selection { background: var(--accent2); color: #000; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* ─── NAV ─────────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(24px, 5vw, 80px);
      transition: opacity 0.5s var(--ease);
    }
    nav.scrolled { opacity: 0; pointer-events: none; }

    .nav-logo { display: flex; align-items: center; text-decoration: none; margin-left: 24px; margin-top: 32px; }
    .nav-logo img { height: 64px; width: auto; display: block; transition: opacity 0.2s ease; }
    .nav-logo:hover img { opacity: 0.75; }

    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s ease; }
    .nav-links a:hover { color: var(--text); }

    .nav-cta { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bg) !important; background: var(--accent); padding: 9px 22px; border-radius: 100px; text-decoration: none; transition: background 0.2s ease, transform 0.15s ease !important; }
    .nav-cta:hover { background: #fff !important; transform: translateY(-1px); }

    .floating-nav { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-12px); z-index: 101; display: flex; align-items: center; background: rgba(8,14,26,0.82); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; padding: 6px 8px; opacity: 0; pointer-events: none; transition: opacity 0.45s var(--ease) 0.25s, transform 0.45s var(--ease) 0.25s; }
    .floating-nav.visible { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .floating-nav a { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 8px 13px; border-radius: 100px; transition: color 0.2s ease, background 0.2s ease; white-space: nowrap; }
    .floating-nav a:hover { color: var(--text); background: rgba(255,255,255,0.07); }
    .floating-nav .pill-cta { color: var(--bg) !important; background: var(--accent); padding: 8px 20px; font-weight: 600; }
    .floating-nav .pill-cta:hover { background: #fff; color: var(--bg) !important; }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 1.5px; background: var(--text); transition: all 0.3s var(--ease); }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu { display: none; position: fixed; inset: 0; z-index: 99; background: rgba(8,8,8,0.97); backdrop-filter: blur(24px); flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; color: var(--text); text-decoration: none; transition: color 0.2s ease; }
    .mobile-menu a:hover { color: var(--accent2); }

    /* ─── BRANDS GRID ─────────────────────────────────────────────── */
    .brands-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 100svh;
      gap: 0;
    }

    .brand-card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      background: var(--bg-card);
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: filter 0.5s var(--ease);
      cursor: pointer;
    }

    .brand-card:last-child { border-right: none; }

    /* When any card is hovered, dim the non-hovered ones */
    .brands-grid:has(.brand-card:hover) .brand-card:not(:hover) {
      filter: brightness(0.25) grayscale(0.6);
    }

    /* Image fills the card */
    .brand-card-image {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .brand-card-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.7s var(--ease);
    }

    .brand-card:hover .brand-card-image img { transform: scale(1.04); }

    .brand-card-image-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0a1020 0%, #060c18 100%);
    }

    /* Dark gradient at bottom for text legibility */
    .brand-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(2,4,10,0.92) 0%, rgba(2,4,10,0.5) 50%, transparent 100%);
      pointer-events: none;
    }

    /* Name + role at bottom */
    .brand-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 36px 40px;
      z-index: 2;
    }

    .brand-card-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .brand-card-role {
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Logo on middle card */
    .brand-card-logo {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 72px;
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }

    .brand-card:hover .brand-card-logo { opacity: 1; }

    /* Arrow indicator */
    .brand-card-arrow {
      position: absolute;
      bottom: 40px;
      right: 36px;
      z-index: 2;
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: opacity 0.35s ease, transform 0.35s var(--ease);
    }

    .brand-card:hover .brand-card-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    .brand-card-arrow svg {
      width: 20px; height: 20px;
      fill: none; stroke: var(--accent);
      stroke-width: 1.5;
    }

    /* ─── MOBILE ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow-y: auto; }
      .nav-links, .nav-cta { display: none; }
      .hamburger { display: flex; }
      .brands-grid {
        grid-template-columns: 1fr;
        height: auto;
      }
      .brand-card {
        height: 70vw;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .brand-card:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

  <nav id="topNav">
    <a href="index.html" class="nav-logo"><img src="logo.svg" alt="PhilmsbyJay" /></a>
    <ul class="nav-links">
      <li><a href="index.html#recentwork">Work</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact" class="nav-cta">Let's Talk</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>

  <div class="floating-nav" id="floatingNav">
    <a href="index.html#recentwork">Work</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact" class="pill-cta">Let's Talk</a>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html#recentwork">Work</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Let's Talk</a>
  </div>

  <!-- BRANDS GRID -->
  <div class="brands-grid">

    <!-- Sayce -->
    <a href="sayce.html" class="brand-card">
      <div class="brand-card-image">
        <!-- <img src="sayce-cover.jpg" alt="Sayce Holmes-Lewis" /> -->
        <div class="brand-card-image-placeholder"></div>
      </div>
      <div class="brand-card-info">
        <h2 class="brand-card-name">Sayce<br>Holmes-Lewis</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <!-- LáYínká — middle card with logo -->
    <a href="layinka.html" class="brand-card">
      <div class="brand-card-image">
        <!-- <img src="layinka-cover.jpg" alt="LáYínká Sánní" /> -->
        <div class="brand-card-image-placeholder"></div>
      </div>
      <img src="logo.svg" alt="PhilmsbyJay" class="brand-card-logo" />
      <div class="brand-card-info">
        <h2 class="brand-card-name">LáYínká<br>Sánní</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <!-- Mas -->
    <a href="mas.html" class="brand-card">
      <div class="brand-card-image">
        <!-- <img src="mas-cover.jpg" alt="Masibu Manima" /> -->
        <div class="brand-card-image-placeholder"></div>
      </div>
      <div class="brand-card-info">
        <h2 class="brand-card-name">Masibu<br>Manima</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { hamburger.classList.remove('open'); mobileMenu.classList.remove('open'); }));
  </script>
</body>
</html>
