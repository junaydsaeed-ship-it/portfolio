<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brands — PhilmsbyJay</title>
  <meta name="description" content="PhilmsbyJay — Personal branding films for real people building real authority." />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&display=swap" rel="stylesheet" />

  <style>
    @font-face { font-family: 'NeueHaasDisplay'; src: url('NeueHaasDisplayLight.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'NeueHaasDisplay'; src: url('NeueHaasDisplayLightItalic.woff2') format('woff2'); font-weight: 300; font-style: italic; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #03070f; --bg-card: #080e1a;
      --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: rgba(240,240,240,0.45);
      --accent: #e8e0d0; --accent2: #c8b89a;
      --font-body: 'NeueHaasDisplay', 'Helvetica Neue', sans-serif;
      --nav-h: 68px; --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Site background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(ellipse 55% 45% at 0% 0%, rgba(29,78,216,0.22) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 100% 100%, rgba(29,78,216,0.18) 0%, transparent 70%),
        linear-gradient(160deg, #03080f 0%, #020510 40%, #010208 100%);
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image:
        linear-gradient(rgba(59,130,246,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.055) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.15) 70%, transparent 100%);
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.15) 70%, transparent 100%);
      pointer-events: none;
    }

    ::selection { background: var(--accent2); color: #000; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* ─── NAV ─────────────────────────────────────────────────────── */
    /* ─── BACK BUTTON ─────────────────────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 18px 10px 14px;
      border-radius: 100px;
      border: 1px solid transparent;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }
    .back-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 20px rgba(232,224,208,0.08);
    }
    .back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; transition: transform 0.25s var(--ease); }
    .back-btn:hover svg { transform: translateX(-3px); }

    /* ─── BRANDS GRID ─────────────────────────────────────────────── */
    .brands-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 100svh;
      gap: 0;
    }

    .brand-card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      background: var(--bg-card);
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: filter 0.5s var(--ease);
      cursor: pointer;
    }

    .brand-card:last-child { border-right: none; }

    /* When any card is hovered, dim the non-hovered ones */
    .brands-grid:has(.brand-card:hover) .brand-card:not(:hover) {
      filter: brightness(0.25) grayscale(0.6);
    }

    /* Image fills the card */
    .brand-card-image {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .brand-card-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.7s var(--ease);
    }

    .brand-card:hover .brand-card-image img { transform: scale(1.04); }

    .brand-card-image-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0a1020 0%, #060c18 100%);
    }

    /* Dark gradient at bottom for text legibility */
    .brand-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(2,4,10,0.92) 0%, rgba(2,4,10,0.5) 50%, transparent 100%);
      pointer-events: none;
    }

    /* Name + role at bottom */
    .brand-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 36px 40px;
      z-index: 2;
    }

    .brand-card-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .brand-card-role {
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Logo on middle card */
    .brand-card-logo {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 72px;
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }

    .brand-card:hover .brand-card-logo { opacity: 1; }

    /* Arrow indicator */
    .brand-card-arrow {
      position: absolute;
      bottom: 40px;
      right: 36px;
      z-index: 2;
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: opacity 0.35s ease, transform 0.35s var(--ease);
    }

    .brand-card:hover .brand-card-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    .brand-card-arrow svg {
      width: 20px; height: 20px;
      fill: none; stroke: var(--accent);
      stroke-width: 1.5;
    }

    /* ─── MOBILE ──────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow-y: auto; }
      .brands-grid {
        grid-template-columns: 1fr;
        height: auto;
      }
      .brand-card {
        height: 70vw;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .brand-card:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">
    <svg viewBox="0 0 16 16"><path d="M13 8H3M3 8L7 4M3 8L7 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Home
  </a>

  <!-- BRANDS GRID -->
  <div class="brands-grid">

    <!-- Sayce -->
    <a href="sayce.html" class="brand-card">
      <div class="brand-card-image">
        <img src="SHL.jpg" alt="Sayce Holmes-Lewis" style="object-position: 60% top;" />
      </div>
      <div class="brand-card-info">
        <h2 class="brand-card-name">Sayce<br>Holmes-Lewis</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <!-- LáYínká — middle card with logo -->
    <a href="layinka.html" class="brand-card">
      <div class="brand-card-image">
        <img src="LY.jpg" alt="LáYínká Sánní" />
      </div>
      <img src="logo.svg" alt="PhilmsbyJay" class="brand-card-logo" />
      <div class="brand-card-info">
        <h2 class="brand-card-name">LáYínká<br>Sánní</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

    <!-- Mas -->
    <a href="mas.html" class="brand-card">
      <div class="brand-card-image">
        <img src="Masibu-Manima.jpg" alt="Masibu Manima" />
      </div>
      <div class="brand-card-info">
        <h2 class="brand-card-name">Masibu<br>Manima</h2>
        <p class="brand-card-role">Personal Brand</p>
      </div>
      <div class="brand-card-arrow">
        <svg viewBox="0 0 20 20"><path d="M4 16L16 4M16 4H8M16 4V12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </a>

  </div>

  <script></script>
</body>
</html>
